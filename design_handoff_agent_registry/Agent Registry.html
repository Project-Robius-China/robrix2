<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robrix · Agent Registry</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --teal:#0f95a3; --teal-dark:#0b7d89; --teal-soft:#e4f4f5;
    --navy:#16233f; --ink:#1f2b45; --muted:#6c7787; --faint:#9aa3b0;
    --border:#e4e8ed; --line:#eef1f4; --bg:#f4f6f8; --card:#ffffff;
    --blue:#2f6db3; --blue-bg:#eaf2fb; --green:#1f9d57; --amber:#c47d1e; --red:#d94c4c;
    --hermes:#c47d1e; --hermes-bg:#fbf1e3;
    --openclaw:#6a52c4; --openclaw-bg:#eee9fb;
    --octos:#1488b5; --octos-bg:#e6f2f9;
    --radius:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#dfe3e8;
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
  }
  #root{width:100%; display:flex; justify-content:center;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}
  input{font-family:inherit;}
  ::-webkit-scrollbar{width:0; height:0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

/* ----------------------------- data ----------------------------- */
const TYPES = {
  hermes:   { id:"hermes",   name:"Hermes",   mono:"He", color:"var(--hermes)",   bg:"var(--hermes-bg)",   reg:"friend",     tag:"Direct agent", blurb:"Registered by adding it as a Matrix friend." },
  openclaw: { id:"openclaw", name:"OpenClaw", mono:"Cl", color:"var(--openclaw)", bg:"var(--openclaw-bg)", reg:"friend",     tag:"Direct agent", blurb:"Registered by adding it as a Matrix friend." },
  octos:    { id:"octos",    name:"Octos",    mono:"Oc", color:"var(--octos)",    bg:"var(--octos-bg)",    reg:"appservice", tag:"AppService",   blurb:"Added as a friend, plus a local AppService binding." },
};

function deriveName(uid){
  const s=uid.trim().replace(/^@/,"").split(":")[0];
  return s ? s.charAt(0).toUpperCase()+s.slice(1) : "New agent";
}
function normUid(uid){
  const v=uid.trim();
  return v.startsWith("@") ? v : "@"+v;
}

const INITIAL_AGENTS = [
  { id:"a1", type:"hermes",   name:"Hermes Prime",  uid:"@hermes:matrix.org",   status:"added" },
  { id:"a2", type:"octos",    name:"Octos Service", uid:"@octosbot:robrix.dev", status:"added", health:"online", url:"http://127.0.0.1:8010", botfather:"octosbot" },
];

/* --------------------------- primitives -------------------------- */
function Tile({ t, size=44, radius=12, fontSize=15 }){
  return (
    <div style={{width:size,height:size,borderRadius:radius,background:t.bg,color:t.color,
      display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize,
      letterSpacing:"-.02em",flex:"none"}}>{t.mono}</div>
  );
}

function FrameworkBadge({ t }){
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:20,
      background:t.bg,color:t.color,fontSize:11.5,fontWeight:600}}>
      <span style={{width:6,height:6,borderRadius:6,background:t.color}}></span>{t.name}
    </span>
  );
}

function HealthDot({ state }){
  const map={online:"var(--green)",offline:"var(--red)",unknown:"var(--faint)",checking:"var(--amber)"};
  return <span style={{width:8,height:8,borderRadius:8,background:map[state]||"var(--faint)",flex:"none",
    boxShadow:state==="online"?"0 0 0 3px rgba(31,157,87,.16)":"none"}}></span>;
}

/* ============================ MAIN SCREEN ========================= */
function MainScreen({ agents, onAdd, onRecheck }){
  const octos = agents.filter(a=>a.type==="octos");
  const onlineCount = octos.filter(a=>a.health==="online").length;
  return (
    <div style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch"}}>
      {/* header */}
      <div style={{padding:"14px 20px 0"}}>
        <button onClick={()=>{}} style={{color:"var(--teal)",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:4,padding:"4px 0"}}>
          <span style={{fontSize:16,lineHeight:1}}>‹</span> Agents
        </button>
        <h1 style={{fontSize:27,fontWeight:800,letterSpacing:"-.02em",margin:"8px 0 6px",color:"var(--navy)"}}>Agent Access</h1>
        <p style={{margin:0,fontSize:13.5,lineHeight:1.5,color:"var(--muted)"}}>
          Register agents to a Matrix account, mark the framework they run, and let Robrix identify them across rooms.
        </p>
      </div>

      {/* add button */}
      <div style={{padding:"16px 20px 4px"}}>
        <button onClick={onAdd} style={{width:"100%",background:"var(--teal)",color:"#fff",fontWeight:700,fontSize:15.5,
          padding:"14px",borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          boxShadow:"0 6px 16px -6px rgba(15,149,163,.55)"}}>
          <span style={{fontSize:20,lineHeight:1,marginTop:-2}}>+</span> Add an agent
        </button>
      </div>

      {/* appservice summary */}
      <div style={{margin:"16px 20px 4px",background:"var(--blue-bg)",borderRadius:14,padding:"14px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontWeight:700,fontSize:14,color:"var(--blue)"}}>Octos AppService</div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12.5,fontWeight:600,color:"var(--muted)"}}>
            <HealthDot state={onlineCount===octos.length&&octos.length?"online":"unknown"}/>
            {onlineCount}/{octos.length||0} online
          </div>
        </div>
        <p style={{margin:"6px 0 0",fontSize:12.5,lineHeight:1.5,color:"#5a6b86"}}>
          Robrix stays a normal Matrix client. It binds local Octos services and runs the matching slash commands.
        </p>
      </div>

      {/* registered list */}
      <div style={{padding:"18px 20px 16px"}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:800,margin:0,color:"var(--navy)"}}>Registered agents</h2>
          <span style={{fontSize:12,fontWeight:700,color:"var(--green)",letterSpacing:".01em"}}>AgentRegistry</span>
        </div>

        {agents.length===0 && (
          <div style={{padding:"34px 16px",textAlign:"center",border:"1px dashed var(--border)",borderRadius:14,color:"var(--faint)",fontSize:13.5}}>
            No agents yet. Tap “Add an agent” to begin.
          </div>
        )}

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {agents.map(a=>{
            const t=TYPES[a.type];
            return (
              <div key={a.id} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:"12px 13px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <Tile t={t}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontWeight:700,fontSize:15,color:"var(--ink)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.name}</span>
                      {a.type==="octos" && <HealthDot state={a.health||"unknown"}/>}
                    </div>
                    <div style={{fontSize:12.5,color:"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.uid}</div>
                  </div>
                  <FrameworkBadge t={t}/>
                </div>
                <div style={{display:"flex",gap:8,marginTop:11,paddingTop:11,borderTop:"1px solid var(--line)"}}>
                  <RowAction label="Open chat"/>
                  {a.type==="octos" && <RowAction label={a.health==="checking"?"Checking…":"Re-check"} onClick={()=>onRecheck(a.id)} accent/>}
                  <RowAction label="Unbind" danger/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{height:8}}></div>
    </div>
  );
}

function RowAction({ label, onClick, accent, danger }){
  const color = danger?"var(--red)":accent?"var(--teal)":"var(--ink)";
  return (
    <button onClick={onClick} style={{flex:1,fontSize:12.5,fontWeight:600,color,padding:"7px",borderRadius:9,
      background:accent?"var(--teal-soft)":"var(--bg)"}}>{label}</button>
  );
}

/* =========================== ADD SHEET ============================ */
function AddSheet({ open, onClose, onComplete }){
  const [step,setStep]=useState(1);
  const [type,setType]=useState(null);
  const [query,setQuery]=useState("");
  const [friend,setFriend]=useState("idle"); // idle | pending | added
  const [botfather,setBotfather]=useState("octosbot");
  const [url,setUrl]=useState("http://127.0.0.1:8010");
  const [health,setHealth]=useState("unknown"); // unknown | checking | online | offline
  const inputRef=useRef(null);

  // reset on open
  useEffect(()=>{
    if(open){ setStep(1); setType(null); setQuery(""); setFriend("idle"); setHealth("unknown"); setBotfather("octosbot"); setUrl("http://127.0.0.1:8010"); }
  },[open]);

  useEffect(()=>{ if(step===2 && inputRef.current) setTimeout(()=>inputRef.current.focus(),320); },[step]);

  const t = type? TYPES[type] : null;

  function addFriend(){
    setFriend("pending");
    setTimeout(()=>setFriend("added"),1300);
  }
  function checkService(){
    setHealth("checking");
    setTimeout(()=>setHealth(Math.random()>0.18?"online":"offline"),1200);
  }
  const isOctos = type==="octos";
  const canFinish = friend==="added" && (!isOctos || health==="online");

  function finish(){
    onComplete({
      id:"a"+Date.now(), type,
      name: deriveName(query),
      uid: normUid(query),
      status:"added",
      ...(isOctos? {health, url, botfather}:{}),
    });
  }

  return (
    <>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(16,24,40,.42)",
        opacity:open?1:0,pointerEvents:open?"auto":"none",transition:"opacity .28s",zIndex:40}}></div>
      <div style={{position:"absolute",left:0,right:0,bottom:0,zIndex:41,background:"#fff",
        borderRadius:"22px 22px 0 0",boxShadow:"0 -12px 40px -12px rgba(16,24,40,.4)",
        transform:open?"translateY(0)":"translateY(102%)",transition:"transform .34s cubic-bezier(.22,1,.36,1)",
        maxHeight:"88%",display:"flex",flexDirection:"column"}}>

        {/* grip + header */}
        <div style={{padding:"10px 0 0"}}>
          <div style={{width:38,height:4.5,borderRadius:6,background:"#d7dce2",margin:"0 auto"}}></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 18px 12px"}}>
          {step===2 && (
            <button onClick={()=>setStep(1)} style={{color:"var(--muted)",fontSize:22,lineHeight:1,padding:"0 4px",marginLeft:-4}}>‹</button>
          )}
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:18,color:"var(--navy)",letterSpacing:"-.01em"}}>
              {step===1? "Add an agent" : `Connect ${t.name}`}
            </div>
            <div style={{fontSize:12.5,color:"var(--muted)",marginTop:1}}>
              {step===1? "Step 1 of 2 · Choose a framework" : (isOctos? "Step 2 of 2 · Friend + AppService binding" : "Step 2 of 2 · Find the Matrix friend")}
            </div>
          </div>
          <button onClick={onClose} style={{color:"var(--faint)",fontSize:22,lineHeight:1,width:30,height:30,borderRadius:8,
            display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>

        {/* body */}
        <div style={{overflowY:"auto",padding:"4px 18px 0",flex:1}}>
          {step===1 ? (
            <Step1 type={type} setType={setType}/>
          ) : (
            <Step2 t={t} isOctos={isOctos} query={query} setQuery={setQuery} inputRef={inputRef}
              friend={friend} addFriend={addFriend}
              botfather={botfather} setBotfather={setBotfather} url={url} setUrl={setUrl}
              health={health} checkService={checkService}/>
          )}
        </div>

        {/* footer */}
        <div style={{padding:"12px 18px",borderTop:"1px solid var(--line)",
          paddingBottom:"calc(12px + env(safe-area-inset-bottom,0px))",background:"#fff"}}>
          {step===1 ? (
            <button disabled={!type} onClick={()=>setStep(2)} style={primaryBtn(!!type)}>Continue</button>
          ) : (
            <button disabled={!canFinish} onClick={finish} style={primaryBtn(canFinish)}>
              {canFinish? "Finish & register" : (friend!=="added"? "Add the agent above to continue" : "Service must be online")}
            </button>
          )}
        </div>
      </div>
    </>
  );
}

function primaryBtn(enabled){
  return {width:"100%",padding:"14px",borderRadius:13,fontWeight:700,fontSize:15.5,
    background:enabled?"var(--teal)":"#e7eaee",color:enabled?"#fff":"var(--faint)",
    boxShadow:enabled?"0 6px 16px -7px rgba(15,149,163,.6)":"none",
    transition:"background .2s, color .2s", cursor:enabled?"pointer":"default"};
}

/* --------------------------- STEP 1 ------------------------------ */
function Step1({ type, setType }){
  return (
    <div style={{paddingBottom:8}}>
      <p style={{margin:"2px 0 14px",fontSize:13.5,lineHeight:1.5,color:"var(--muted)"}}>
        Each framework registers a little differently. Pick the one your agent runs on.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:11}}>
        {Object.values(TYPES).map(t=>{
          const sel=type===t.id;
          return (
            <button key={t.id} onClick={()=>setType(t.id)} style={{textAlign:"left",display:"flex",alignItems:"center",gap:13,
              padding:"13px 14px",borderRadius:15,background:"#fff",
              border:`1.5px solid ${sel?t.color:"var(--border)"}`,
              boxShadow:sel?`0 0 0 3px ${t.bg}`:"none",transition:"box-shadow .18s, border-color .18s"}}>
              <Tile t={t} size=
{50} radius={14} fontSize={17}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:700,fontSize:16,color:"var(--ink)"}}>{t.name}</span>
                  <span style={{fontSize:10.5,fontWeight:700,letterSpacing:".03em",textTransform:"uppercase",
                    color:t.color,background:t.bg,padding:"2px 7px",borderRadius:20}}>{t.tag}</span>
                </div>
                <div style={{fontSize:12.5,color:"var(--muted)",marginTop:3,lineHeight:1.4}}>{t.blurb}</div>
              </div>
              <span style={{width:21,height:21,borderRadius:21,flex:"none",border:`2px solid ${sel?t.color:"#d7dce2"}`,
                background:sel?t.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {sel && <span style={{color:"#fff",fontSize:12,fontWeight:800,lineHeight:1}}>✓</span>}
              </span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* --------------------------- STEP 2 ------------------------------ */
function Step2(p){
  const { t, isOctos, query, setQuery, inputRef,
          friend, addFriend, botfather, setBotfather, url, setUrl, health, checkService } = p;
  const hasId = query.trim().length>0;
  const locked = friend!=="idle";
  return (
    <div style={{paddingBottom:10}}>
      <div style={{fontWeight:700,fontSize:14,color:"var(--navy)",margin:"4px 0 9px",display:"flex",alignItems:"center",gap:8}}>
        <Tile t={t} size={22} radius={7} fontSize={9}/> New {t.name} agent
      </div>
      <div style={{fontSize:12.5,fontWeight:600,color:"var(--muted)",marginBottom:5}}>Agent Matrix ID</div>
      <div style={{position:"relative",marginBottom:9}}>
        <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"var(--faint)",fontSize:14.5,fontWeight:600}}>@</span>
        <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)}
          placeholder="agent:server" disabled={locked}
          style={{width:"100%",padding:"12px 12px 12px 29px",borderRadius:12,border:"1px solid var(--border)",
            fontSize:14.5,outline:"none",background:locked?"#f0f2f4":"var(--bg)",color:"var(--ink)"}}/>
      </div>
      <p style={{margin:"0 0 14px",fontSize:12.5,lineHeight:1.5,color:"var(--muted)"}}>
        Robrix sends a friend request to this account and records that it runs on {t.name}.
      </p>

      {/* add friend */}
      <div style={{marginBottom:isOctos?16:4}}>
        {friend!=="added" ? (
          <button onClick={addFriend} disabled={!hasId||friend==="pending"} style={{width:"100%",padding:"13px",borderRadius:12,fontWeight:700,fontSize:14.5,
            border:`1.5px solid ${hasId?t.color:"var(--border)"}`,color:friend==="pending"?"var(--muted)":(hasId?t.color:"var(--faint)"),
            background:friend==="pending"?"var(--bg)":"#fff",cursor:hasId&&friend!=="pending"?"pointer":"default",
            display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {friend==="pending" ? (<><Spinner color="var(--muted)"/> Sending friend request…</>) : (<>＋ Add friend &amp; bind</>)}
          </button>
        ) : (
          <div style={{display:"flex",alignItems:"center",gap:9,padding:"12px",borderRadius:12,background:"#eaf7ef",
            border:"1px solid #c6e9d3"}}>
            <span style={{width:22,height:22,borderRadius:22,background:"var(--green)",color:"#fff",display:"flex",
              alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flex:"none"}}>✓</span>
            <div style={{fontSize:13.5,color:"#1c6e42",fontWeight:600}}>Friend request sent — {normUid(query)} bound to {t.name}.</div>
          </div>
        )}
      </div>

      {/* OCTOS appservice extras */}
      {isOctos && (
        <div style={{opacity:friend==="added"?1:.45,pointerEvents:friend==="added"?"auto":"none",
          transition:"opacity .25s",borderTop:"1px solid var(--line)",paddingTop:14}}>
          <div style={{fontWeight:700,fontSize:14,color:"var(--navy)",marginBottom:3}}>AppService binding</div>
          <p style={{margin:"0 0 13px",fontSize:12.5,lineHeight:1.5,color:"var(--muted)"}}>
            Octos runs as a Matrix AppService. Point Robrix at the local service and confirm it responds before finishing.
          </p>

          <Field label="BotFather user ID">
            <input value={botfather} onChange={e=>setBotfather(e.target.value)} style={inputStyle}/>
          </Field>
          <Field label="Local Octos service">
            <input value={url} onChange={e=>setUrl(e.target.value)} style={inputStyle}/>
          </Field>

          <div style={{display:"flex",alignItems:"center",gap:9,marginTop:4}}>
            <button onClick={checkService} disabled={health==="checking"} style={{padding:"10px 16px",borderRadius:11,fontWeight:700,fontSize:13.5,
              background:"var(--octos-bg)",color:"var(--octos)",display:"flex",alignItems:"center",gap:7}}>
              {health==="checking"? <><Spinner color="var(--octos)"/> Checking…</> : "Check now"}
            </button>
            <StatusPill health={health}/>
          </div>

          {health==="offline" && (
            <div style={{marginTop:11,fontSize:12.5,lineHeight:1.5,color:"#9a3b3b",background:"#fbecec",
              border:"1px solid #f3d2d2",borderRadius:11,padding:"10px 12px"}}>
              No response from <b>{url}</b>. Start the local Octos service, then re-check.
            </div>
          )}

          <button onClick={()=>{}} disabled={health!=="online"} style={{width:"100%",marginTop:12,padding:"11px",borderRadius:11,
            fontWeight:700,fontSize:13.5,border:`1px solid ${health==="online"?"var(--octos)":"var(--border)"}`,
            color:health==="online"?"var(--octos)":"var(--faint)",background:"#fff",
            display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
            ↗ Open local binding
          </button>
        </div>
      )}
    </div>
  );
}

const inputStyle={width:"100%",padding:"11px 12px",borderRadius:11,border:"1px solid var(--border)",
  fontSize:14,outline:"none",background:"var(--bg)",color:"var(--ink)"};

function Field({ label, children }){
  return (
    <div style={{marginBottom:11}}>
      <div style={{fontSize:12.5,fontWeight:600,color:"var(--muted)",marginBottom:5}}>{label}</div>
      {children}
    </div>
  );
}

function StatusPill({ health }){
  const map={
    unknown:{txt:"Unknown",c:"var(--faint)",bg:"#eef0f3"},
    checking:{txt:"Checking",c:"var(--amber)",bg:"#fbf2e2"},
    online:{txt:"Online",c:"var(--green)",bg:"#e7f6ee"},
    offline:{txt:"Offline",c:"var(--red)",bg:"#fbecec"},
  };
  const m=map[health];
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:20,
      fontSize:12.5,fontWeight:700,color:m.c,background:m.bg}}>
      <HealthDot state={health}/>{m.txt}
    </span>
  );
}

function Spinner({ color="#fff", size=14 }){
  return (
    <span style={{width:size,height:size,borderRadius:size,border:`2px solid ${color}`,borderTopColor:"transparent",
      display:"inline-block",animation:"spin .7s linear infinite"}}></span>
  );
}

/* ============================ BOTTOM NAV ========================== */
function BottomNav({ onAdd }){
  const Icon = ({ d, active })=>(
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active?"var(--teal)":"var(--navy)"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>
  );
  return (
    <div style={{flex:"none",borderTop:"1px solid var(--border)",background:"#f7f8fa",
      display:"flex",alignItems:"center",justifyContent:"space-around",
      padding:"10px 14px calc(12px + env(safe-area-inset-bottom,0px))"}}>
      <button><Icon active d={<path d="M3 10.5 12 3l9 7.5V21H3z"/>}/></button>
      <button onClick={onAdd} style={{width:46,height:46,borderRadius:46,background:"transparent",
        display:"flex",alignItems:"center",justifyContent:"center"}}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--navy)" strokeWidth="2.2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button><svg width="22" height="22" viewBox="0 0 24 24" fill="var(--navy)"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg></button>
      <button style={{position:"relative"}}>
        <div style={{width:34,height:34,borderRadius:34,background:"#7b39d6",color:"#fff",display:"flex",
          alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15}}>B</div>
        <span style={{position:"absolute",top:-3,right:-3,width:16,height:16,borderRadius:16,background:"var(--red)",
          color:"#fff",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid #f7f8fa"}}>!</span>
      </button>
    </div>
  );
}

/* ============================== APP ============================== */
function App(){
  const [agents,setAgents]=useState(INITIAL_AGENTS);
  const [sheet,setSheet]=useState(false);
  const [toast,setToast]=useState(null);

  function recheck(id){
    setAgents(a=>a.map(x=>x.id===id?{...x,health:"checking"}:x));
    setTimeout(()=>setAgents(a=>a.map(x=>x.id===id?{...x,health:Math.random()>0.2?"online":"offline"}:x)),1100);
  }
  function complete(agent){
    setAgents(a=>[agent,...a]);
    setSheet(false);
    setToast(`${agent.name} registered`);
    setTimeout(()=>setToast(null),2600);
  }

  return (
    <div style={{width:412,height:880,background:"#fff",borderRadius:30,overflow:"hidden",position:"relative",
      display:"flex",flexDirection:"column",boxShadow:"0 30px 80px -24px rgba(16,24,40,.5)",
      border:"1px solid #e6e9ee"}}>
      {/* status bar */}
      <div style={{flex:"none",height:30,display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"0 22px",fontSize:13,fontWeight:700,color:"var(--navy)",background:"#fff"}}>
        <span>9:41</span>
        <span style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:11}}>●●●</span>
          <svg width="22" height="11" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="20" height="10" rx="2.5" stroke="var(--navy)" strokeWidth="1.4"/><rect x="3" y="3" width="14" height="6" rx="1" fill="var(--navy)"/><rect x="22" y="4" width="2" height="4" rx="1" fill="var(--navy)"/></svg>
        </span>
      </div>

      <MainScreen agents={agents} onAdd={()=>setSheet(true)} onRecheck={recheck}/>
      <BottomNav onAdd={()=>setSheet(true)}/>
      <AddSheet open={sheet} onClose={()=>setSheet(false)} onComplete={complete}/>

      {/* toast */}
      <div style={{position:"absolute",left:0,right:0,bottom:88,display:"flex",justifyContent:"center",zIndex:60,
        pointerEvents:"none",opacity:toast?1:0,transform:toast?"translateY(0)":"translateY(8px)",transition:"all .3s"}}>
        <div style={{background:"var(--navy)",color:"#fff",padding:"10px 16px",borderRadius:24,fontSize:13.5,fontWeight:600,
          display:"flex",alignItems:"center",gap:8,boxShadow:"0 8px 24px -8px rgba(0,0,0,.5)"}}>
          <span style={{width:18,height:18,borderRadius:18,background:"var(--green)",display:"flex",alignItems:"center",
            justifyContent:"center",fontSize:11,fontWeight:800}}>✓</span>{toast}
        </div>
      </div>
    </div>
  );
}

const style=document.createElement("style");
style.textContent="@keyframes spin{to{transform:rotate(360deg)}}";
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
