[book]
title = "HAgency：人与智能体的协作空间"
description = "HAgency = Human + Agency。基于 Robrix2 + agent-chat + Matrix，构建以人为能动主体、与 AI 智能体团队协作的空间。"
authors = ["Alex Zhang"]
language = "zh-CN"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/Project-Robius-China/robrix2"
additional-js = ["mermaid.min.js", "mermaid-init.js", "lang-switch.js"]

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
