<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Lab · Mobile reference (Robrix2)</title>
<!--
  Agent Lab — mobile reference (overview 平铺)
  Adapts the desktop Agent Lab flow to mobile, mirroring the supplied reference
  designs. Visual language = src/shared/design_tokens.rs (RBX_* tokens) +
  docs/ui-visual-spec-zh.md component contracts (§4 SectionCard / StatusBadge /
  SettingRow / CapabilityChip / SegmentedTabs / ToggleSwitch / StickyActionBar /
  BottomTabBar). Light-first; the Agent Lab hero header is the one dark zone.

  This is a static reference to build the Makepad UI from — not a clickable demo.
  Colors are RBX tokens verbatim; type/sizing scaled to real device px for
  on-screen readability (the RBX TextStyle sizes are Makepad's dense internal units).
-->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<style>
  :root {
    /* surfaces */
    --bg-canvas:#F7F9FC; --bg-surface:#FFFFFF; --bg-subtle:#F4F7FB; --bg-sunken:#EEF2F8;
    --bg-hover:#EFF4FB; --bg-selected:#E4F5F7; --bg-pressed:#E7ECF3; --bg-disabled:#F0F2F6;
    /* foreground */
    --fg-primary:#16233B; --fg-secondary:#5A6B86; --fg-tertiary:#8A98AE;
    --fg-on-accent:#FFFFFF; --fg-disabled:#AEB7C6;
    /* accent */
    --accent:#119FB3; --accent-hover:#0E8C9E; --accent-pressed:#0B7484;
    --accent-soft:#E4F5F7; --link:#1887C9;
    /* brand / identity */
    --identity-teal:#14B8A6; --brand-purple:#572DCC; --brand-cyan:#05CDC7;
    /* strokes */
    --stroke-soft:#E6EBF2; --stroke-strong:#D5DEEA; --divider:rgba(0,0,0,0.06);
    /* semantic states */
    --success-fg:#1B8A4B; --success-bg:#E8F6EE;
    --warning-fg:#C6790B; --warning-bg:#FBF1DD;
    --danger-fg:#C5392F;  --danger-bg:#FBE9E7;
    --info-fg:#1E6FBF;    --info-bg:#E7F0FB;
    --neutral-fg:#5A6B86; --neutral-bg:#EEF1F6;
    /* dark zones */
    --nav-bg:#1A2336; --login-bg:#0E1626; --login-surface:#16213A;
    /* radius */
    --r-xs:6px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-pill:999px;
    /* elevation */
    --shadow:0 6px 20px rgba(22,35,59,0.10); --shadow-strong:0 12px 32px rgba(22,35,59,0.18);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin:0; background:#e8edf4; font-family:var(--font);
    color:var(--fg-primary); -webkit-font-smoothing:antialiased;
  }
  .page-head { padding:40px 48px 8px; }
  .page-head h1 { margin:0 0 6px; font-size:26px; letter-spacing:-0.01em; }
  .page-head p { margin:0; color:var(--fg-secondary); font-size:14px; max-width:760px; line-height:1.5; }
  .legend { display:flex; flex-wrap:wrap; gap:14px; padding:14px 48px 4px; }
  .legend span { font-size:12px; color:var(--fg-secondary); display:flex; align-items:center; gap:6px; }
  .legend i { width:12px; height:12px; border-radius:3px; display:inline-block; }
  .rail {
    display:flex; gap:34px; padding:28px 48px 64px; overflow-x:auto;
    align-items:flex-start;
  }
  .framewrap { flex:0 0 auto; }
  .framelabel { font-size:13px; color:#55617a; margin:0 0 10px 4px; font-style:italic; }
  .framelabel-strong { font-style:normal; font-weight:600; color:#2b3650; }
  /* in-screen primitives */
  .scr { height:100%; background:var(--bg-canvas); display:flex; flex-direction:column; }
  .scrbody { flex:1; overflow:auto; padding:14px 14px 18px; display:flex; flex-direction:column; gap:14px; }
  .scrbody::-webkit-scrollbar{ width:0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
/* ── IosFrame (inlined from huashu-design assets/ios_frame.jsx, unmodified) ── */
const iosFrameStyles = {
  wrapper:{display:'inline-block',padding:12,background:'#0b0b0d',borderRadius:60,boxShadow:'0 0 0 2px #1f2937, 0 20px 60px rgba(0,0,0,0.3)',position:'relative'},
  screen:{position:'relative',borderRadius:48,overflow:'hidden',background:'#fff'},
  statusBar:{position:'absolute',top:0,left:0,right:0,height:54,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',fontSize:16,fontWeight:600,fontFamily:'-apple-system,"SF Pro Text",sans-serif',zIndex:20,pointerEvents:'none'},
  dynamicIsland:{position:'absolute',top:12,left:'50%',transform:'translateX(-50%)',width:124,height:36,background:'#000',borderRadius:999,zIndex:30},
  statusIcons:{display:'flex',alignItems:'center',gap:6},
  signalIcon:{display:'flex',alignItems:'flex-end',gap:2,height:12},
  signalBar:{width:3,background:'currentColor',borderRadius:1},
  batteryIcon:{width:26,height:12,border:'1.5px solid currentColor',borderRadius:3,padding:1,position:'relative',opacity:0.85},
  batteryCap:{position:'absolute',top:3,right:-3,width:2,height:6,background:'currentColor',borderRadius:'0 1px 1px 0'},
  content:{position:'absolute',top:0,left:0,right:0,bottom:0,overflow:'hidden'},
  homeIndicator:{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',width:140,height:5,background:'rgba(0,0,0,0.28)',borderRadius:999,zIndex:40,pointerEvents:'none'},
};
function IosFrame({children,width=390,height=844,time='9:41',battery=92,statusColor='#000'}){
  return (
    <div style={iosFrameStyles.wrapper}>
      <div style={{...iosFrameStyles.screen,width,height}}>
        <div style={{...iosFrameStyles.statusBar,color:statusColor}}>
          <span>{time}</span>
          <div style={iosFrameStyles.statusIcons}>
            <div style={iosFrameStyles.signalIcon}>
              {[4,6,9,11].map((h,i)=><div key={i} style={{...iosFrameStyles.signalBar,height:h}}/>)}
            </div>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style={{color:statusColor}}>
              <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor"/>
              <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round"/>
              <path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7"/>
            </svg>
            <div style={iosFrameStyles.batteryIcon}>
              <div style={{width:`${battery}%`,height:'100%',background:'currentColor',borderRadius:1,opacity:0.9}}/>
              <div style={iosFrameStyles.batteryCap}/>
            </div>
          </div>
        </div>
        {/* dynamic island only over light status bars; dark hero draws its own clearance */}
        <div style={iosFrameStyles.dynamicIsland}/>
        <div style={iosFrameStyles.content}>{children}</div>
        <div style={iosFrameStyles.homeIndicator}/>
      </div>
    </div>
  );
}

/* ───────────────────────── shared primitives ───────────────────────── */
const C = {  // token shortcuts
  canvas:'var(--bg-canvas)', surface:'var(--bg-surface)', subtle:'var(--bg-subtle)',
  sunken:'var(--bg-sunken)', selected:'var(--bg-selected)',
  fg:'var(--fg-primary)', fg2:'var(--fg-secondary)', fg3:'var(--fg-tertiary)',
  accent:'var(--accent)', accentSoft:'var(--accent-soft)', link:'var(--link)',
  soft:'var(--stroke-soft)', strong:'var(--stroke-strong)', divider:'var(--divider)',
};

// status badge — RBX semantic pairs (§4.2)
const BADGE = {
  success:{bg:'var(--success-bg)',fg:'var(--success-fg)'},
  warning:{bg:'var(--warning-bg)',fg:'var(--warning-fg)'},
  danger:{bg:'var(--danger-bg)',fg:'var(--danger-fg)'},
  info:{bg:'var(--info-bg)',fg:'var(--info-fg)'},
  neutral:{bg:'var(--neutral-bg)',fg:'var(--neutral-fg)'},
  accent:{bg:'var(--accent-soft)',fg:'var(--accent)'},
};
function Badge({variant='neutral',children,dot}){
  const v=BADGE[variant];
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:v.bg,color:v.fg,
    borderRadius:'var(--r-pill)',padding:'3px 9px',fontSize:11,fontWeight:700,whiteSpace:'nowrap',lineHeight:1.4}}>
    {dot&&<i style={{width:6,height:6,borderRadius:99,background:v.fg,display:'inline-block'}}/>}{children}</span>;
}
// CapabilityChip (§4.4) — same shape as badge, info/accent semantics; ✓ = enabled
function Chip({on=true,variant='success',children}){
  const v = on? BADGE[variant] : {bg:'var(--bg-subtle)',fg:'var(--fg-tertiary)'};
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:v.bg,color:v.fg,
    border:on?'none':'1px solid var(--stroke-soft)',borderRadius:'var(--r-pill)',padding:'5px 11px',
    fontSize:12.5,fontWeight:600,whiteSpace:'nowrap'}}>
    {on&&<span style={{fontSize:11,opacity:.9}}>✓</span>}{children}</span>;
}
function Avatar({letter,size=40,fg='var(--accent)',bg='var(--accent-soft)',dot}){
  return <div style={{position:'relative',width:size,height:size,flex:`0 0 ${size}px`}}>
    <div style={{width:size,height:size,borderRadius:'var(--r-md)',background:bg,color:fg,
      display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:size*0.42}}>{letter}</div>
    {dot&&<i style={{position:'absolute',right:-1,bottom:-1,width:11,height:11,borderRadius:99,
      background:'var(--success-fg)',border:'2px solid var(--bg-surface)'}}/>}
  </div>;
}
// SectionCard recipe (§4.1) — white surface + soft border + radius-md
function Card({children,pad=14,style}){
  return <div style={{background:C.surface,border:'1px solid '+C.soft,borderRadius:'var(--r-md)',
    padding:pad,...style}}>{children}</div>;
}
function CardTitle({children,sub,right}){
  return <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:sub?2:8}}>
    <div><div style={{fontSize:13,fontWeight:700,color:C.fg2,textTransform:'none',letterSpacing:0}}>{children}</div>
    {sub&&<div style={{fontSize:12,color:C.fg3,marginTop:3,lineHeight:1.45}}>{sub}</div>}</div>{right}</div>;
}
// SettingRow (§4.3)
function Row({icon,title,sub,right,chevron,last}){
  return <div style={{display:'flex',alignItems:'center',gap:12,minHeight:52,padding:'8px 2px',
    borderBottom:last?'none':'1px solid '+C.divider}}>
    {icon&&<span style={{width:22,textAlign:'center',color:C.fg3,fontSize:16}}>{icon}</span>}
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:14,fontWeight:600,color:C.fg}}>{title}</div>
      {sub&&<div style={{fontSize:12,color:C.fg3,marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sub}</div>}
    </div>
    {right}{chevron&&<span style={{color:C.fg3,fontSize:18,marginLeft:2}}>›</span>}
  </div>;
}
// SegmentedTabs (§4.9) — in-page, underline style matching the reference
function SegTabs({tabs,active}){
  return <div style={{display:'flex',gap:18,borderBottom:'1px solid '+C.soft,padding:'0 2px'}}>
    {tabs.map(t=>{const on=t===active;return <div key={t} style={{padding:'10px 0',fontSize:14,
      fontWeight:on?700:500,color:on?C.accent:C.fg2,borderBottom:'2px solid '+(on?C.accent:'transparent'),
      marginBottom:-1}}>{t}</div>;})}
  </div>;
}
// pill-style segmented tabs (Account/Preferences/Labs/About — the Settings shell)
function PillTabs({tabs,active}){
  return <div style={{display:'flex',gap:8}}>
    {tabs.map(t=>{const on=t===active;return <span key={t} style={{padding:'7px 14px',borderRadius:'var(--r-pill)',
      fontSize:13,fontWeight:on?700:500,background:on?C.accent:'var(--bg-sunken)',
      color:on?'var(--fg-on-accent)':C.fg2}}>{t}</span>;})}
  </div>;
}
function Toggle({on}){
  return <div style={{width:44,height:26,borderRadius:99,background:on?C.accent:'var(--stroke-strong)',
    position:'relative',flex:'0 0 44px'}}>
    <div style={{position:'absolute',top:3,left:on?21:3,width:20,height:20,borderRadius:99,background:'#fff',
      boxShadow:'0 1px 3px rgba(0,0,0,0.25)',transition:'left .15s'}}/></div>;
}
function Field({label,value,placeholder,right,mono}){
  return <div style={{marginBottom:4}}>
    {label&&<div style={{fontSize:13,fontWeight:600,color:C.fg2,marginBottom:6}}>{label}</div>}
    <div style={{display:'flex',alignItems:'center',gap:8,background:C.surface,border:'1px solid '+C.soft,
      borderRadius:'var(--r-sm)',padding:'11px 12px',minHeight:44}}>
      <span style={{flex:1,fontSize:14,color:value?C.fg:C.fg3,fontFamily:mono?'ui-monospace,SFMono-Regular,Menlo,monospace':'inherit',
        whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{value||placeholder}</span>
      {right}
    </div>
  </div>;
}
function Select({label,value,half}){
  return <div style={{flex:half?1:'unset',marginBottom:4}}>
    {label&&<div style={{fontSize:13,fontWeight:600,color:C.fg2,marginBottom:6}}>{label}</div>}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,background:C.surface,
      border:'1px solid '+C.soft,borderRadius:'var(--r-sm)',padding:'11px 12px',minHeight:44}}>
      <span style={{fontSize:14,color:C.fg}}>{value}</span><span style={{color:C.fg3}}>⌄</span></div>
  </div>;
}
// StickyActionBar (§4.13)
function StickyBar({secondary='Cancel',primary='Save',danger}){
  return <div style={{display:'flex',gap:10,padding:'10px 14px',paddingBottom:18,borderTop:'1px solid '+C.divider,
    background:C.canvas}}>
    {danger&&<button style={{...btn('ghost'),color:'var(--danger-fg)',borderColor:'var(--danger-bg)',flex:'0 0 auto',padding:'0 16px'}}>{danger}</button>}
    <button style={{...btn('ghost'),flex:1}}>{secondary}</button>
    <button style={{...btn('primary'),flex:2}}>{primary}</button>
  </div>;
}
function btn(kind){
  const base={height:46,borderRadius:'var(--r-md)',fontSize:15,fontWeight:700,border:'1px solid transparent',
    cursor:'default',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7};
  if(kind==='primary') return {...base,background:C.accent,color:'#fff'};
  if(kind==='ghost')   return {...base,background:C.surface,color:C.fg,borderColor:C.soft};
  if(kind==='accentsoft') return {...base,background:C.accentSoft,color:C.accent};
  return base;
}
// BottomTabBar (§4.14) — mirrors the reference: Home / Mentions / Labs / Settings
function TabBar({active}){
  const tabs=[['Home','⌂'],['Mentions','@',3],['Labs','⚗'],['Settings','⚙']];
  return <div style={{display:'flex',height:58,borderTop:'1px solid '+C.soft,background:C.surface,paddingBottom:6}}>
    {tabs.map(([t,ic,badge])=>{const on=t===active;return <div key={t} style={{flex:1,display:'flex',
      flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,
      color:on?C.accent:C.fg2,position:'relative'}}>
      <span style={{fontSize:20,lineHeight:1}}>{ic}</span>
      <span style={{fontSize:10.5,fontWeight:on?700:500}}>{t}</span>
      {badge&&<span style={{position:'absolute',top:4,left:'calc(50% + 6px)',background:'var(--danger-fg)',color:'#fff',
        fontSize:9,fontWeight:700,borderRadius:99,minWidth:15,height:15,display:'flex',alignItems:'center',
        justifyContent:'center',padding:'0 3px'}}>{badge}</span>}
    </div>;})}
  </div>;
}
// dark Agent-Lab hero header (the one dark zone, per reference)
function DarkHero({title,sub,action}){
  return <div style={{background:'var(--login-bg)',color:'#fff',padding:'58px 16px 16px',
    display:'flex',alignItems:'center',gap:12}}>
    <div style={{width:38,height:38,borderRadius:10,background:'linear-gradient(135deg,var(--brand-purple),var(--brand-cyan))',
      display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:18}}>◑</div>
    <div style={{flex:1}}>
      <div style={{fontSize:19,fontWeight:700,letterSpacing:'-0.01em'}}>{title}</div>
      <div style={{fontSize:12.5,color:'#9fb0cb',marginTop:1}}>{sub}</div>
    </div>
    {action}
  </div>;
}
function Search({placeholder='Search agents, rooms, or servers…'}){
  return <div style={{display:'flex',alignItems:'center',gap:9,background:C.surface,border:'1px solid '+C.soft,
    borderRadius:'var(--r-md)',padding:'11px 13px'}}>
    <span style={{color:C.fg3,fontSize:15}}>⌕</span>
    <span style={{flex:1,fontSize:14,color:C.fg3}}>{placeholder}</span>
    <span style={{color:C.fg3,fontSize:15}}>⇅</span></div>;
}
function InfoBanner({children}){
  return <div style={{display:'flex',gap:9,background:'var(--info-bg)',borderRadius:'var(--r-md)',padding:'11px 12px'}}>
    <span style={{color:'var(--info-fg)',fontWeight:700}}>ⓘ</span>
    <div style={{fontSize:12.5,color:'#2b4a6e',lineHeight:1.5}}>{children}</div></div>;
}

/* agent fixtures (from the reference) */
const AGENTS=[
  {l:'S',name:'SRE Agent',mxid:'@agent-sre:matrix.org',fw:'OpenClaw',st:['Active','success'],sub:'OpenClaw',fg:'var(--accent)',bg:'var(--accent-soft)',sel:true,dot:true},
  {l:'O',name:'Octos Translator',mxid:'@octosbot_translator:127.0.0.1:8128',fw:'Octos',st:['Bot','info'],sub:'Octos · BotFather child',fg:'#1B8A4B',bg:'var(--success-bg)'},
  {l:'H',name:'Hermes Coding',mxid:'@hermes:palpo.local',fw:'OpenClaw',st:['Review','warning'],sub:'OpenClaw',fg:'#C6790B',bg:'var(--warning-bg)'},
];

/* ───────────────────────── SCREEN 1 · Agent list ───────────────────────── */
function ScreenList(){
  return <div className="scr">
    <DarkHero title="Agent Lab" sub="4 registered Matrix agents"
      action={<div style={{width:38,height:38,borderRadius:10,background:'#22304d',display:'flex',
        alignItems:'center',justifyContent:'center',fontSize:22,color:'#fff'}}>+</div>}/>
    <div className="scrbody">
      <Search/>
      <Card pad={4}>
        {AGENTS.map((a,i)=>(
          <div key={a.name} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 10px',
            background:a.sel?'var(--bg-selected)':'transparent',borderRadius:a.sel?'var(--r-sm)':0,
            border:a.sel?'1px solid var(--accent)':'none',
            borderBottom:(!a.sel&&i<AGENTS.length)?'1px solid '+C.divider:(a.sel?'1px solid var(--accent)':'none')}}>
            <Avatar letter={a.l} fg={a.fg} bg={a.bg}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:15.5,fontWeight:700,color:C.fg}}>{a.name}</div>
              <div style={{fontSize:12.5,color:C.fg2,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.mxid}</div>
              <div style={{fontSize:12,color:C.fg3,marginTop:1}}>{a.sub}</div>
            </div>
            <Badge variant={a.st[1]}>{a.st[0]}</Badge>
            <span style={{color:C.fg3,fontSize:18}}>›</span>
          </div>
        ))}
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'13px 10px'}}>
          <div style={{width:40,height:40,borderRadius:'var(--r-md)',border:'1.5px dashed var(--stroke-strong)',
            display:'flex',alignItems:'center',justifyContent:'center',color:C.fg3,fontSize:20}}>+</div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,color:C.fg}}>Add or Create Agent</div>
            <div style={{fontSize:12.5,color:C.fg3,marginTop:1}}>Bind existing account or create a new bot</div>
          </div>
          <span style={{color:C.fg3,fontSize:18}}>›</span>
        </div>
      </Card>

      <Card>
        <CardTitle right={<Badge variant="success" dot>3 active</Badge>}>Registry</CardTitle>
        <Row icon="◔" title="Identity source" right={<span style={{fontSize:13,fontWeight:600,color:C.fg2}}>Global · AgentRegistry</span>}/>
        <Row icon="⇆" title="Multi-account" right={<span style={{fontSize:13,color:C.fg2}}>No cross-account leak</span>}/>
        <Row icon="⛁" title="Storage" sub="latest_app_state.json" right={<Badge variant="success">Synced</Badge>} last/>
      </Card>
      <div style={{fontSize:11.5,color:C.fg3,textAlign:'center',padding:'2px 8px',lineHeight:1.5}}>
        AgentRegistry is the source of truth — badges, rendering and bot targeting all read from it.
      </div>
    </div>
    <TabBar active="Labs"/>
  </div>;
}

/* ───────────────────────── SCREEN 2 · Agent detail · Profile ───────────────────────── */
function ScreenProfile(){
  return <div className="scr">
    {/* light hero with back + menu */}
    <div style={{background:C.surface,borderBottom:'1px solid '+C.soft,padding:'58px 14px 12px'}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:22,color:C.fg2}}>‹</span>
        <Avatar letter="S" size={44} dot/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:18,fontWeight:700}}>SRE Agent</span><Badge variant="success">Active</Badge>
          </div>
          <div style={{fontSize:12.5,color:C.fg2,marginTop:1}}>@agent-sre:matrix.org · OpenClaw</div>
        </div>
        <span style={{fontSize:20,color:C.fg2}}>⋮</span>
      </div>
      <div style={{marginTop:12}}><SegTabs tabs={['Profile','Rendering','Rooms','Advanced']} active="Profile"/></div>
    </div>
    <div className="scrbody">
      <Field label="Display name" value="SRE Agent"/>
      <Field label="Agent Matrix ID" value="@agent-sre:matrix.org" mono right={<Badge variant="success">Verified</Badge>}/>
      <div style={{fontSize:11.5,color:C.fg3,marginTop:-6,lineHeight:1.5}}>
        Robrix stores the Matrix account. LLM provider keys stay on the bot side.</div>
      <div style={{display:'flex',gap:10}}>
        <Select label="Framework" value="OpenClaw" half/>
        <Select label="Trust tier" value="Approval req." half/>
      </div>
      <div>
        <div style={{fontSize:13,fontWeight:600,color:C.fg2,marginBottom:8}}>Capabilities</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
          <Chip>Tool calls</Chip><Chip>Code</Chip><Chip>Files</Chip>

          <Avatar letter="S" size={34}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <span style={{fontWeight:700,fontSize:14}}>SRE Agent</span><Badge variant="info">OpenClaw</Badge>

            <div style={{fontSize:13.5,color:C.fg,marginTop:4}}>Prometheus query complete.</div>

              padding:'9px 11px',marginTop:8,background:C.subtle}}>

              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>Tool call</div>

function miniBtn(bg,fg,border){return {background:bg,color:fg,border:border?'1px solid var(--stroke-soft)':'none',
  borderRadius:'var(--r-sm)',padding:'7px 12px',fontSize:13,fontWeight:600};}

/* ───────────────────────── SCREEN 5 · Create BotFather bot ───────────────────────── */
function Stepper({steps,active}){
  return <div style={{display:'flex',gap:6,marginBottom:4}}>
    {steps.map((s,i)=>{const on=i<=active;return <div key={s} style={{flex:1,textAlign:'center'}}>
      <div style={{width:24,height:24,margin:'0 auto 5px',borderRadius:99,
        background:on?C.accent:'var(--bg-sunken)',color:on?'#fff':C.fg3,fontSize:12,fontWeight:700,
        display:'flex',alignItems:'center',justifyContent:'center'}}>{i+1}</div>
      <div style={{fontSize:10.5,color:on?C.fg:C.fg3,fontWeight:i===active?700:500,lineHeight:1.3}}>{s}</div>
    </div>;})}
  </div>;
}

/* ───────────────────────── layout ───────────────────────── */
function Frame({label,strong,children}){
  return <div className="framewrap">
    <div className="framelabel"><span className="framelabel-strong">{strong}</span>{label?' · '+label:''}</div>
    <IosFrame statusColor="#000"><div style={{height:'100%'}}>{children}</div></IosFrame>
  </div>;
}
// screen 1 + 2 have a dark hero meeting the status bar -> white status text on those two
function App(){
  return <div>
    <div className="page-head">
      <h1>Agent Lab · 移动端参考图</h1>
      <p>P0-A Agent 配置中心 · 移动端适配。视觉语言取自 <code>src/shared/design_tokens.rs</code>（RBX_* tokens）与
      <code>docs/ui-visual-spec-zh.md</code> 组件契约。桌面三栏 → 移动单列 + 屏内 segmented tabs。静态参考图，用于实现 Makepad UI。</p>

}
// list screen's dark hero touches the status bar; flip status text to white via overlay frame
function ScreenListWhiteStatus(){
  return <div style={{height:'100%',position:'relative'}}>
    <div style={{position:'absolute',top:0,left:0,right:0,height:54,zIndex:25,pointerEvents:'none'}}/>
    <ScreenList/>

}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
