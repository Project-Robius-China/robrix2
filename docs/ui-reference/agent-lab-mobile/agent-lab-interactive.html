<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Lab · Interactive (Robrix2 mobile)</title>
<!--
  Agent Lab — interactive mobile flow demo.
  Lives INSIDE Settings ▸ Labs (additive; does NOT change the existing mobile
  structure: bottom nav untouched, Settings stays a full-screen pushed view with
  a close affordance). Flow: Settings▸Labs → Agents → list → detail
  (Profile/Rendering/Rooms) → Add/Bind & Create BotFather.
  Visual language = src/shared/design_tokens.rs (RBX_* tokens) +
  docs/ui-visual-spec-zh.md §4 component contracts. Light-first.
-->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<style>
  :root{
    --bg-canvas:#F7F9FC;--bg-surface:#FFFFFF;--bg-subtle:#F4F7FB;--bg-sunken:#EEF2F8;
    --bg-hover:#EFF4FB;--bg-selected:#E4F5F7;--bg-pressed:#E7ECF3;
    --fg-primary:#16233B;--fg-secondary:#5A6B86;--fg-tertiary:#8A98AE;--fg-on-accent:#fff;
    --accent:#119FB3;--accent-hover:#0E8C9E;--accent-soft:#E4F5F7;--link:#1887C9;
    --identity-teal:#14B8A6;--brand-purple:#572DCC;--brand-cyan:#05CDC7;
    --stroke-soft:#E6EBF2;--stroke-strong:#D5DEEA;--divider:rgba(0,0,0,0.06);
    --success-fg:#1B8A4B;--success-bg:#E8F6EE;--warning-fg:#C6790B;--warning-bg:#FBF1DD;
    --danger-fg:#C5392F;--danger-bg:#FBE9E7;--info-fg:#1E6FBF;--info-bg:#E7F0FB;
    --neutral-fg:#5A6B86;--neutral-bg:#EEF1F6;--login-bg:#0E1626;
    --r-xs:6px;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-pill:999px;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"PingFang SC",sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#e8edf4;font-family:var(--font);color:var(--fg-primary);-webkit-font-smoothing:antialiased;}
  .stage{display:flex;gap:48px;align-items:flex-start;padding:40px 56px;}
  .stage h1{margin:0 0 6px;font-size:24px;}
  .stage p{margin:0 0 14px;color:#55617a;font-size:14px;max-width:420px;line-height:1.55;}
  .hintcard{background:#fff;border:1px solid #e2e8f1;border-radius:14px;padding:18px 20px;max-width:430px;box-shadow:0 8px 30px rgba(22,35,59,.06);}
  .hintcard h3{margin:0 0 10px;font-size:14px;color:#2b3650;}
  .flow{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 14px;}
  .flow span{font-size:12px;background:#eef2f8;color:#46546e;border-radius:99px;padding:4px 10px;}
  .hintcard ul{margin:8px 0 0;padding-left:18px;color:#55617a;font-size:13px;line-height:1.7;}
  .hintcard code{background:#f0f3f8;padding:1px 5px;border-radius:5px;font-size:12px;}
  .tap{cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .tap:active{opacity:.55;}
  .scr{height:100%;background:var(--bg-canvas);display:flex;flex-direction:column;overflow:hidden;}
  .body{flex:1;overflow:auto;padding:13px 13px 20px;display:flex;flex-direction:column;gap:13px;}
  .body::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ── IosFrame (huashu-design assets/ios_frame.jsx, content area full-bleed) ── */
const FR={wrapper:{display:'inline-block',padding:12,background:'#0b0b0d',borderRadius:60,boxShadow:'0 0 0 2px #1f2937,0 24px 70px rgba(0,0,0,.34)',position:'relative'},
 screen:{position:'relative',borderRadius:48,overflow:'hidden',background:'#fff'},
 status:{position:'absolute',top:0,left:0,right:0,height:54,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',fontSize:16,fontWeight:600,zIndex:20,pointerEvents:'none'},
 island:{position:'absolute',top:12,left:'50%',transform:'translateX(-50%)',width:124,height:36,background:'#000',borderRadius:999,zIndex:30},
 icons:{display:'flex',alignItems:'center',gap:6},bar:{width:3,background:'currentColor',borderRadius:1},
 batt:{width:26,height:12,border:'1.5px solid currentColor',borderRadius:3,padding:1,position:'relative',opacity:.85},
 cap:{position:'absolute',top:3,right:-3,width:2,height:6,background:'currentColor',borderRadius:'0 1px 1px 0'},
 content:{position:'absolute',inset:0,overflow:'hidden'},
 home:{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',width:140,height:5,background:'rgba(0,0,0,.28)',borderRadius:999,zIndex:40,pointerEvents:'none'}};
function IosFrame({children,width=390,height=844,statusColor='#16233B'}){
  return <div id="phone" style={FR.wrapper}><div style={{...FR.screen,width,height}}>
    <div style={{...FR.status,color:statusColor}}><span>9:41</span>
      <div style={FR.icons}>
        <div style={{display:'flex',alignItems:'flex-end',gap:2,height:12}}>{[4,6,9,11].map((h,i)=><div key={i} style={{...FR.bar,height:h}}/>)}</div>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style={{color:statusColor}}><path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor"/><path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round"/><path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" opacity=".7"/></svg>
        <div style={FR.batt}><div style={{width:'92%',height:'100%',background:'currentColor',borderRadius:1,opacity:.9}}/><div style={FR.cap}/></div>
      </div></div>
    <div style={FR.island}/><div style={FR.content}>{children}</div><div style={FR.home}/>
  </div></div>;
}

/* ── token shortcuts + primitives ── */
const C={surface:'var(--bg-surface)',canvas:'var(--bg-canvas)',subtle:'var(--bg-subtle)',selected:'var(--bg-selected)',
 fg:'var(--fg-primary)',fg2:'var(--fg-secondary)',fg3:'var(--fg-tertiary)',accent:'var(--accent)',accentSoft:'var(--accent-soft)',
 soft:'var(--stroke-soft)',strong:'var(--stroke-strong)',divider:'var(--divider)'};
const BADGE={success:['var(--success-bg)','var(--success-fg)'],warning:['var(--warning-bg)','var(--warning-fg)'],
 danger:['var(--danger-bg)','var(--danger-fg)'],info:['var(--info-bg)','var(--info-fg)'],neutral:['var(--neutral-bg)','var(--neutral-fg)'],
 accent:['var(--accent-soft)','var(--accent)']};
function Badge({v='neutral',dot,children}){const[bg,fg]=BADGE[v];return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:bg,color:fg,borderRadius:'var(--r-pill)',padding:'3px 9px',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{dot&&<i style={{width:6,height:6,borderRadius:99,background:fg}}/>}{children}</span>;}
function Chip({on=true,v='success',children,onClick}){const[bg,fg]=on?BADGE[v]:['var(--bg-subtle)','var(--fg-tertiary)'];
  return <span onClick={onClick} className={onClick?'tap':''} style={{display:'inline-flex',alignItems:'center',gap:5,background:bg,color:fg,border:on?'none':'1px solid var(--stroke-soft)',borderRadius:'var(--r-pill)',padding:'5px 11px',fontSize:12.5,fontWeight:600,whiteSpace:'nowrap'}}>{on&&<span style={{fontSize:11,opacity:.9}}>✓</span>}{children}</span>;}
function Avatar({letter,size=40,fg='var(--accent)',bg='var(--accent-soft)',dot}){return <div style={{position:'relative',width:size,height:size,flex:`0 0 ${size}px`}}><div style={{width:size,height:size,borderRadius:'var(--r-md)',background:bg,color:fg,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:size*.42}}>{letter}</div>{dot&&<i style={{position:'absolute',right:-1,bottom:-1,width:11,height:11,borderRadius:99,background:'var(--success-fg)',border:'2px solid #fff'}}/>}</div>;}
function Card({children,pad=14,style,onClick}){return <div onClick={onClick} className={onClick?'tap':''} style={{background:C.surface,border:'1px solid '+C.soft,borderRadius:'var(--r-md)',padding:pad,...style}}>{children}</div>;}
function CardTitle({children,sub,right}){return <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:sub?2:8}}><div><div style={{fontSize:13,fontWeight:700,color:C.fg2}}>{children}</div>{sub&&<div style={{fontSize:12,color:C.fg3,marginTop:3,lineHeight:1.45}}>{sub}</div>}</div>{right}</div>;}
function Row({icon,title,sub,right,chevron,last,onClick}){return <div onClick={onClick} className={onClick?'tap':''} style={{display:'flex',alignItems:'center',gap:12,minHeight:52,padding:'8px 2px',borderBottom:last?'none':'1px solid '+C.divider}}>{icon&&<span style={{width:22,textAlign:'center',color:C.fg3,fontSize:16}}>{icon}</span>}<div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,color:C.fg}}>{title}</div>{sub&&<div style={{fontSize:12,color:C.fg3,marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sub}</div>}</div>{right}{chevron&&<span style={{color:C.fg3,fontSize:18,marginLeft:2}}>›</span>}</div>;}
function SegTabs({tabs,active,onPick}){return <div style={{display:'flex',gap:16,borderBottom:'1px solid '+C.soft,padding:'0 2px',overflowX:'auto'}}>{tabs.map(t=>{const on=t===active;return <div key={t} className="tap" onClick={()=>onPick&&onPick(t)} style={{padding:'10px 0',fontSize:14,fontWeight:on?700:500,color:on?C.accent:C.fg2,borderBottom:'2px solid '+(on?C.accent:'transparent'),marginBottom:-1,whiteSpace:'nowrap'}}>{t}</div>;})}</div>;}
function PillTabs({tabs,active,onPick}){return <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:2}}>{tabs.map(t=>{const on=t===active;return <span key={t} className="tap" onClick={()=>onPick&&onPick(t)} style={{padding:'7px 13px',borderRadius:'var(--r-pill)',fontSize:13,fontWeight:on?700:500,background:on?C.accent:'var(--bg-sunken)',color:on?'#fff':C.fg2,whiteSpace:'nowrap'}}>{t}</span>;})}</div>;}
function Toggle({on,onClick}){return <div onClick={onClick} className={onClick?'tap':''} style={{width:44,height:26,borderRadius:99,background:on?C.accent:'var(--stroke-strong)',position:'relative',flex:'0 0 44px'}}><div style={{position:'absolute',top:3,left:on?21:3,width:20,height:20,borderRadius:99,background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,.25)',transition:'left .15s'}}/></div>;}
function Field({label,value,placeholder,right,mono}){return <div style={{marginBottom:4}}>{label&&<div style={{fontSize:13,fontWeight:600,color:C.fg2,marginBottom:6}}>{label}</div>}<div style={{display:'flex',alignItems:'center',gap:8,background:C.surface,border:'1px solid '+C.soft,borderRadius:'var(--r-sm)',padding:'11px 12px',minHeight:44}}><span style={{flex:1,fontSize:14,color:value?C.fg:C.fg3,fontFamily:mono?'ui-monospace,Menlo,monospace':'inherit',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{value||placeholder}</span>{right}</div></div>;}
function Select({label,value,half}){return <div style={{flex:half?1:'unset',marginBottom:4}}>{label&&<div style={{fontSize:13,fontWeight:600,color:C.fg2,marginBottom:6}}>{label}</div>}<div className="tap" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,background:C.surface,border:'1px solid '+C.soft,borderRadius:'var(--r-sm)',padding:'11px 12px',minHeight:44}}><span style={{fontSize:14,color:C.fg}}>{value}</span><span style={{color:C.fg3}}>⌄</span></div></div>;}
function Search({ph='Search agents, rooms, or servers…'}){return <div style={{display:'flex',alignItems:'center',gap:9,background:C.surface,border:'1px solid '+C.soft,borderRadius:'var(--r-md)',padding:'11px 13px'}}><span style={{color:C.fg3}}>⌕</span><span style={{flex:1,fontSize:14,color:C.fg3}}>{ph}</span><span style={{color:C.fg3}}>⇅</span></div>;}
function Info({children}){return <div style={{display:'flex',gap:9,background:'var(--info-bg)',borderRadius:'var(--r-md)',padding:'11px 12px'}}><span style={{color:'var(--info-fg)',fontWeight:700}}>ⓘ</span><div style={{fontSize:12.5,color:'#2b4a6e',lineHeight:1.5}}>{children}</div></div>;}
function btn(kind){const b={height:46,borderRadius:'var(--r-md)',fontSize:15,fontWeight:700,border:'1px solid transparent',display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7};
 if(kind==='primary')return{...b,background:C.accent,color:'#fff'};if(kind==='ghost')return{...b,background:C.surface,color:C.fg,borderColor:C.soft};return b;}
function StickyBar({secondary='Cancel',primary='Save',danger,onSecondary,onPrimary,onDanger}){return <div style={{display:'flex',gap:10,padding:'10px 13px 18px',borderTop:'1px solid '+C.divider,background:C.canvas}}>{danger&&<button className="tap" onClick={onDanger} style={{...btn('ghost'),color:'var(--danger-fg)',borderColor:'var(--danger-bg)',padding:'0 16px'}}>{danger}</button>}<button className="tap" onClick={onSecondary} style={{...btn('ghost'),flex:1}}>{secondary}</button><button className="tap" onClick={onPrimary} style={{...btn('primary'),flex:2}}>{primary}</button></div>;}
/* full-screen Settings header (back/close), per existing CloseSettings affordance */
function Head({title,sub,onBack,back='‹',right,avatar}){return <div style={{background:C.surface,borderBottom:'1px solid '+C.soft,padding:'56px 13px 12px'}}><div style={{display:'flex',alignItems:'center',gap:11}}><span className="tap" onClick={onBack} style={{fontSize:24,color:C.fg2,width:22}}>{back}</span>{avatar}<div style={{flex:1,minWidth:0}}><div style={{fontSize:18,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{title}</div>{sub&&<div style={{fontSize:12.5,color:C.fg2,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sub}</div>}</div>{right}</div></div>;}

const AGENTS=[
 {id:'sre',l:'S',name:'SRE Agent',mxid:'@agent-sre:matrix.org',fw:'OpenClaw',st:['Active','success'],sub:'OpenClaw',fg:'var(--accent)',bg:'var(--accent-soft)',dot:true},
 {id:'octos',l:'O',name:'Octos Translator',mxid:'@octosbot_translator:127.0.0.1:8128',fw:'Octos',st:['Bot','info'],sub:'Octos · BotFather child',fg:'#1B8A4B',bg:'var(--success-bg)'},
 {id:'hermes',l:'H',name:'Hermes Coding',mxid:'@hermes:palpo.local',fw:'OpenClaw',st:['Review','warning'],sub:'OpenClaw',fg:'#C6790B',bg:'var(--warning-bg)'},
];

/* ───── SCREEN A · Settings ▸ Labs (entry, existing shell + Agents section) ───── */
function ScreenLabs({nav}){
  return <div className="scr">
    <div style={{background:C.surface,borderBottom:'1px solid '+C.soft,padding:'56px 13px 12px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontSize:22,fontWeight:700}}>Settings</div>
        <span className="tap" style={{fontSize:22,color:C.fg2}}>✕</span>
      </div>
      <PillTabs tabs={['Account','Preferences','Devices','Labs','Contribute']} active="Labs"/>
    </div>
    <div className="body">
      {/* existing: App Service (unchanged behavior) */}
      <Card>
        <CardTitle right={<Toggle on={false}/>} sub="Enable Matrix app service support for BotFather & child bots.">App Service</CardTitle>
        <div style={{height:8}}/>
        <Row icon="🤖" title="BotFather User ID" right={<span style={{fontSize:13,color:C.fg2,fontFamily:'ui-monospace,Menlo,monospace'}}>octosbot</span>}/>
        <Row icon="◎" title="Octos Service" sub="http://127.0.0.1:8010" right={<Badge v="success">Reachable</Badge>} last/>
      </Card>

      {/* NEW: Agents section — the only additive change to the Labs page */}
      <Card pad={4}>
        <div style={{padding:'10px 10px 6px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:13,fontWeight:700,color:C.fg2}}>Agents</div>
          <Badge v="accent">AgentRegistry</Badge>
        </div>
        {AGENTS.map((a,i)=>(
          <div key={a.id} className="tap" onClick={()=>nav.openAgent(a.id)} style={{display:'flex',alignItems:'center',gap:11,padding:'10px',borderTop:'1px solid '+C.divider}}>
            <Avatar letter={a.l} size={34} fg={a.fg} bg={a.bg}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14.5,fontWeight:700}}>{a.name}</div>
              <div style={{fontSize:12,color:C.fg3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.sub}</div>
            </div>
            <Badge v={a.st[1]}>{a.st[0]}</Badge><span style={{color:C.fg3,fontSize:18}}>›</span>
          </div>
        ))}
        <div className="tap" onClick={nav.openList} style={{padding:'12px 10px',borderTop:'1px solid '+C.divider,display:'flex',alignItems:'center',gap:8,color:C.accent,fontWeight:700,fontSize:14}}>
          <span>⚗</span>Open Agent Lab<span style={{marginLeft:'auto',color:C.fg3}}>›</span>
        </div>
      </Card>

      {/* existing: Translation (unchanged) */}
      <Card><CardTitle right={<Toggle on={false}/>} sub="OpenAI-compatible API for real-time message translation.">Real-time Translation</CardTitle></Card>

      <div style={{fontSize:11.5,color:C.fg3,textAlign:'center',lineHeight:1.5,padding:'2px 10px'}}>
        Agent Lab lives inside Labs — no change to the bottom navigation in this first step.</div>
    </div>
  </div>;
}

/* ───── SCREEN B · Agent list ───── */
function ScreenList({nav}){
  return <div className="scr">
    <Head title="Agent Lab" sub="4 registered Matrix agents" onBack={nav.back}/>
    <div className="body">
      <Search/>
      <Card pad={4}>
        {AGENTS.map(a=>(
          <div key={a.id} className="tap" onClick={()=>nav.openAgent(a.id)} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 10px',borderBottom:'1px solid '+C.divider}}>
            <Avatar letter={a.l} fg={a.fg} bg={a.bg} dot={a.dot}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:15.5,fontWeight:700}}>{a.name}</div>
              <div style={{fontSize:12.5,color:C.fg2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.mxid}</div>
              <div style={{fontSize:12,color:C.fg3,marginTop:1}}>{a.sub}</div>
            </div>
            <Badge v={a.st[1]}>{a.st[0]}</Badge><span style={{color:C.fg3,fontSize:18}}>›</span>
          </div>
        ))}
        <div className="tap" onClick={nav.openAdd} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 10px'}}>
          <div style={{width:40,height:40,borderRadius:'var(--r-md)',border:'1.5px dashed var(--stroke-strong)',display:'flex',alignItems:'center',justifyContent:'center',color:C.fg3,fontSize:20}}>+</div>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>Add or Create Agent</div><div style={{fontSize:12.5,color:C.fg3}}>Bind existing account or create a new bot</div></div>
          <span style={{color:C.fg3,fontSize:18}}>›</span>
        </div>
      </Card>
      <Card>
        <CardTitle right={<Badge v="success" dot>3 active</Badge>}>Registry</CardTitle>
        <Row icon="◔" title="Identity source" right={<span style={{fontSize:13,fontWeight:600,color:C.fg2}}>Global</span>}/>
        <Row icon="⇆" title="Multi-account" right={<span style={{fontSize:13,color:C.fg2}}>No cross-account leak</span>}/>
        <Row icon="⛁" title="Storage" sub="latest_app_state.json" right={<Badge v="success">Synced</Badge>} last/>
      </Card>
    </div>
  </div>;
}

/* ───── SCREEN C · Agent detail (Profile / Rendering / Rooms) ───── */
function DetailProfile(){
  return <React.Fragment>
    <Field label="Display name" value="SRE Agent"/>
    <Field label="Agent Matrix ID" value="@agent-sre:matrix.org" mono right={<Badge v="success">Verified</Badge>}/>
    <div style={{display:'flex',gap:10}}><Select label="Framework" value="OpenClaw" half/><Select label="Trust tier" value="Approval req." half/></div>
    <div><div style={{fontSize:13,fontWeight:600,color:C.fg2,marginBottom:8}}>Capabilities</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:7}}><Chip>Tool calls</Chip><Chip>Code</Chip><Chip>Files</Chip><Chip v="info">Vision</Chip><Chip>Approval buttons</Chip><Chip on={false}>Streaming edits</Chip></div></div>
    <Info><b>Preview:</b> shown in timeline, room/DM lists, profile card & the agent message renderer.</Info>
    <Card><CardTitle>Timeline preview</CardTitle>
      <div style={{display:'flex',gap:10,marginTop:4}}><Avatar letter="S" size={34}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:7}}><span style={{fontWeight:700,fontSize:14}}>SRE Agent</span><Badge v="info">OpenClaw</Badge><span style={{marginLeft:'auto',fontSize:12,color:C.fg3}}>15:12</span></div>
          <div style={{fontSize:13.5,marginTop:4}}>Prometheus query complete.</div>
          <div style={{display:'flex',alignItems:'center',gap:9,border:'1px solid '+C.soft,borderRadius:'var(--r-sm)',padding:'9px 11px',marginTop:8,background:C.subtle}}><span style={{color:'var(--success-fg)'}}>⊘</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>Tool call</div><div style={{fontSize:12,color:C.fg2,fontFamily:'ui-monospace,Menlo,monospace'}}>prometheus.query_range</div></div><span style={{fontSize:12,color:C.fg3}}>892 ms ›</span></div>
          <div style={{fontSize:13,color:C.fg2,marginTop:8,lineHeight:1.5}}><b style={{color:C.fg}}>Analysis:</b> latency up 320% on api-gateway-1. Recommend scaling to 3 replicas.</div>
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <span style={mb('var(--success-bg)','var(--success-fg)')}>✓ Approve</span>
            <span style={mb('var(--danger-bg)','var(--danger-fg)')}>✕ Reject</span>
            <span style={mb('var(--bg-surface)',C.fg2,true)}>Details</span></div>
        </div></div></Card>
  </React.Fragment>;
}
function mb(bg,fg,b){return{background:bg,color:fg,border:b?'1px solid var(--stroke-soft)':'none',borderRadius:'var(--r-sm)',padding:'7px 12px',fontSize:13,fontWeight:600};}
function DetailRendering(){
  return <React.Fragment>
    <Card><CardTitle sub="Where the agent identity appears in the UI.">L1 · identity surfaces</CardTitle>
      <div style={{display:'flex',flexWrap:'wrap',gap:7,marginTop:6}}><Chip>Timeline badge</Chip><Chip>Room list</Chip><Chip>DM list</Chip><Chip>Profile</Chip><Chip>Input hint</Chip></div></Card>
    <Card><CardTitle sub="How the agent's messages are presented.">L2 · message renderer</CardTitle>
      <Select label="Thinking display" value="Collapsed by default"/><Select label="Tool calls display" value="As status cards"/>

function ScreenAdd({nav,tab,setTab}){

/* ───── AppPhone state machine ───── */
function AppPhone(){
  const [screen,setScreen]=React.useState('labs');      // labs | list | detail | add
  const [detailTab,setDetailTab]=React.useState('Profile');
  const [addTab,setAddTab]=React.useState('Bind account');
  const [stack,setStack]=React.useState([]);            // back stack
  const go=(s)=>{setStack(p=>[...p,screen]);setScreen(s);};
  const back=()=>{setStack(p=>{const n=[...p];const prev=n.pop()||'labs';setScreen(prev);return n;});};
  const nav={
    openList:()=>go('list'),
    openAgent:(id)=>{setDetailTab('Profile');go('detail');},
    openAdd:()=>{setAddTab('Bind account');go('add');},
    back,
  };
  const statusColor = screen==='labs' ? '#16233B' : '#16233B'; // all light headers now
  return <IosFrame statusColor={statusColor}>
    {screen==='labs'   && <ScreenLabs nav={nav}/>}
    {screen==='list'   && <ScreenList nav={nav}/>}
    {screen==='detail' && <ScreenDetail nav={nav} tab={detailTab} setTab={setDetailTab}/>}
    {screen==='add'    && <ScreenAdd nav={nav} tab={addTab} setTab={setAddTab}/>}
  </IosFrame>;
}

function Root(){
  return <div className="stage">
    <div>
      <h1>Agent Lab · 可交互原型</h1>
      <p>移动端 · 藏在 <b>Settings ▸ Labs</b> 内,第一步不改底栏/大结构。点进去走完整流程。</p>
      <div className="hintcard">
        <h3>试一下这条流程</h3>
        <div className="flow"><span>Settings▸Labs</span><span>→ Agents</span><span>→ 列表</span><span>→ 详情</span><span>→ Add/Bind</span></div>
        <ul>
          <li>在 <b>Labs</b> 页点 <code>Agents</code> 区里任一 agent,或 <code>Open Agent Lab ›</code></li>
          <li>详情页切 <b>Profile / Rendering / Rooms</b> 三个 tab</li>
          <li>列表底部 <code>Add or Create Agent</code> → 切 <b>Bind account / Create bot</b></li>
          <li>左上 <code>‹</code> 返回,<code>Save / Cancel</code> 回上一层</li>
        </ul>
      </div>
    </div>
    <AppPhone/>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
